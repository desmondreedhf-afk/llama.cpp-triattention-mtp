name: Performance report
description: Share benchmark results or performance regressions
title: "[Perf]: "
labels: [performance]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What performance change did you observe?
    validations:
      required: true
  - type: textarea
    id: hardware
    attributes:
      label: Hardware and software
      placeholder: |
        OS:
        CPU:
        GPU:
        RAM / VRAM:
        Compiler:
        Build flags:
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model and quantization
      placeholder: e.g. Llama model name, Q4_K_M, Q8_0
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands
      description: Provide the exact benchmark or run commands.
      render: shell
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Results
      description: Include baseline, experiment, and any relevant measurements.
    validations:
      required: true
